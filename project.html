<!DOCTYPE html>
<html lang="en" data-theme="dark" data-mode="portfolio">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — E.S.Doodles</title>
  <meta name="description" content="Project detail — E.S.Doodles portfolio.">

  <!-- OG tags updated dynamically by project.js -->
  <meta property="og:title"  content="Project — E.S.Doodles">
  <meta property="og:type"   content="website">
  <meta property="og:url"    content="https://esdoodles.com/project.html">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/pages.css">

  <script>
    (function () {
      var t = localStorage.getItem('esd-theme') || 'dark';
      var m = localStorage.getItem('esd-mode')  || 'portfolio';
      document.documentElement.dataset.theme = t;
      document.documentElement.dataset.mode  = m;
    })();
  </script>
</head>
<body>

  <a href="#main" class="skip-link">Skip to main content</a>
  <header id="site-header" class="site-header"></header>

  <!-- Breadcrumb -->
  <nav aria-label="Breadcrumb" style="background:var(--surface);border-bottom:1px solid var(--border)">
    <div class="container" style="padding-top:var(--sp-3);padding-bottom:var(--sp-3)">
      <ol style="list-style:none;padding:0;display:flex;gap:var(--sp-2);font-size:var(--text-xs);color:var(--text-muted)">
        <li><a href="index.html" style="color:inherit;text-decoration:none">Home</a></li>
        <li aria-hidden="true" style="opacity:0.4">›</li>
        <li><a href="work.html" style="color:inherit;text-decoration:none">Work</a></li>
        <li aria-hidden="true" style="opacity:0.4">›</li>
        <li aria-current="page" id="breadcrumb-title" style="color:var(--text)">Project</li>
      </ol>
    </div>
  </nav>

  <!-- Main content injected by project.js -->
  <main id="main">
    <!-- Loading state -->
    <div class="container" style="padding:var(--sp-10) 0;text-align:center" id="loading-state">
      <p class="text-muted" style="font-style:italic;font-family:var(--font-heading)">loading…</p>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/utils.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/mode.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/project.js" defer></script>
  <script>
    // Update breadcrumb when project title is known
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const titleEl = document.querySelector('.project-detail__title');
        const breadcrumb = document.getElementById('breadcrumb-title');
        if (titleEl && breadcrumb) {
          breadcrumb.textContent = titleEl.textContent;
        }
      });
      observer.observe(document.getElementById('main'), { childList: true, subtree: true });
    });
  </script>

</body>
</html>
